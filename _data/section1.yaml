        **Together with stewarding the Oren Lyons Archive and Research Project, 
        we seek to support a vibrant ecosystem for indigenous scholarship by:**

        Securing funding to formally launch collaborations between the archive and faculty from the Center for Global Indigenous Culture and Environmental Justice, embedding archive access into courses and programs.
        Supporting Syracuse University's Haudenosaunee Promise Scholarship that allows students from the Six Nations to attend the University tuition-free, making it one of the nation’s leading programs for Indigenous students. Establish an endowment or dedicated fund to safeguard the program's sustainability and support its development to meet rising enrollment and resource needs.
