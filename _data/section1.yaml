    content: |

        Oren R. Lyons is a world-renowned Faithkeeper of the Turtle Clan of the Onondaga Nation. A Professor Emeritus at SUNY Buffalo and a pivotal figure in international diplomacy, he has advised global leaders and institutions for decades. He earned a Bachelor of Fine Artsfrom Syracuse University in 1958 and was awarded
        an honorary Doctor of Laws degree from the University in 1993.

        Syracuse University sits on the ancestral lands of the Onondaga Nation, the central fire of the Haudenosaunee
        (Iroquois) Confederacy that has had a profound impact
        on the world.

