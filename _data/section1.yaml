    content: |
        The archive encompasses an estimated 200 linear feet of materials spread across multiple locations. Its contents include:
        + Documents and ofﬁcial correspondence.
        + Speeches and transcripts from ﬁve decades of global advocacy.
        + Media-spanning multiple formats.
        + Engagements with inﬂuential ﬁgures from John Lennon to Al Gore and Desmond Tutu.
        + Artwork and cultural materials requiring specialized care.
        All materials will be housed in the Special Collections Research Center of Syracuse Libraries with culturally appropriate protocols and shared management principles.
  
