    content: |
        Donor support will be essential to fully realizing the vision forthe Oren Lyons
        Archive and Research Project as a living, accessible and prominent resource that
        bridges Indigenous wisdom and contemporary challenges. Your support will ensure
        that current and future generations have access to unparalleled records that
        illuminate Oren Lyons’ voice, wisdom and legacy, building knowledge and context
        that advance climate justice, cultural preservation and global understanding.

        For more information about giving opportunities, please contact: Philip P. Arnold pparnold@syr.edu. 
