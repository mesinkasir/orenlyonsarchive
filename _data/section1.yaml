    content: |
        The Oren Lyons Archive and Research Project represents a vital resource of speeches, correspondence, media and documents with a global reach, spanning ﬁve decades of advocacy—from North American Indigenous activism to United Nations working groups and international climate summits. Established through a cooperative agreement with Syracuse University through the libraries’ Special Collections Research Center in October 2025 and aligned with the new Center for Global Indigenous Cultures and Environmental Justice, this monumental initiative is poised for immediate global impact.
        This comprehensive plan transforms the collection from a simple repository into a living resource that informs work in Indigenous civil rights and accelerates solutions to the climate crisis, ensuring both access and permanent, culturally appropriate stewardship for generations of scholars, students and activists.
  
